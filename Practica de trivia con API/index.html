<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trivia</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1> Trivia de Preguntas </h1>

<div class="container">

    <select id="categoria">
    <option value="">Seleccionar categoría</option>
    </select>
    <button id="btnStart">Comenzar</button>
    <p id="error"></p>

    <div id="juego" class="oculto">
        <p id="progreso"></p>
        <p id="timer"></p>
        <h2 id="pregunta"></h2>
        <div id="opciones"></div>
    </div>

    <div id="resultado" class="oculto">
        <h2>Resultado</h2>
        <p id="resumen"></p>
        <button id="reiniciar"> Inicio </button>
    </div>

</div>



<script src="app.js"></script>
</body>
</html>
