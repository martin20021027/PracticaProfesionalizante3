<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Memoria y Suma</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1> Juego de Memoria y Suma </h1>
<div class="container">
    <!-- CONFIGURACION -->
    <div>
        <label>Cantidad de números:</label>
        <input type="number" id="cantidad" >
        <br>
        <label>Intervalo (segundos):</label>
        <input type="number" id="intervalo"  >
        <br>
        <label>
            <input type="checkbox" id="negativos"> Permitir negativos
        </label>
        <br>
        <button onclick="iniciarJuego()">Iniciar</button>
    </div>
    
    <!-- VISUALIZACION -->
    <div id="display">-</div>
    
    <!-- RESPUESTA -->
    <div>
        <input type="number" id="respuesta" placeholder="Ingresar suma" disabled>
        <button onclick="verificar()" disabled id="btnVerificar">Confirmar</button>
    </div>
    <div id="resultado"></div>

</div>
<script src="app.js"></script>
</body>
</html>
